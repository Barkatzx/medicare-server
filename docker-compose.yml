version: "3.9"

services:
  app:
    build: .
    container_name: medicare-server
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

volumes:
  redis_data:

networks:
  backend_net:
    driver: bridge